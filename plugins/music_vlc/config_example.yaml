music_vlc:
  config:
    DESCRIPTION: "Music, playlists, VLC"
    USE_LOCATION: 1
    BYPASS_ROUTER:
      OTHERS:
        - "musique"
        - "music"
      PLAYLIST:
        - "playlist"
      MUSIC:
        - "vlc"
        - "augmente"
        - "monte"
        - "baisse"
        - "diminue"
        - "moins"
        - "plus"
        - "précédent"
        - "suivant"
        - "après"
        - "remets"
        
    REPLACE_PLAYLISTS:
      - "Default"
      - "Rock"
      - "Touhou"
    SMB_MOUNT_POINT: "PATH_TO_MUSIC_LIBRARY"
        
  vlc_configuration:
    VLC_PORT_START: 48888
    LEN_ALBUMS_CACHE: 50

  access_control:
    DICO_VLC_USERS:
      TEST: "test"
    DICO_MA_USERS:
      TEST: "test"