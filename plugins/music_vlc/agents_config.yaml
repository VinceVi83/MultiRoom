MUSIC_VLC:
  MUSIC_AGENT:
    name: "MUSIC_AGENT"
    model: "qwen2.5:3b"
    use_json: false
    options:
      temperature: 0.0
      num_predict: 100
      num_ctx: 2048
    prompt: |
      Task: Classify the input command into one of these 3 CATEGORY:
      
      MUSIC (VLC/Playback control ONLY: stop, pause, next, volume. 'relance la music', 'stop la music', 'passe la music', 'Remets la musique', 'baisse le son')
      DISCOVER (General requests to start playback: 'balance ' 'mets de la musique', 'mets du son', 'joue quelque chose')
      NONE (Not related to media playback)
      
      STRICT RULES:
      1. Return a JSON object with the key "CATEGORY".
      2. Be extremely literal
      
      Constraint: Return ONLY valid JSON: {"CATEGORY": "VALUE"}
      
      Example: {"CATEGORY": "MUSIC"}

  PLAYLIST_AGENT:
    name: "PLAYLIST_AGENT"
    model: "qwen2.5:3b"
    use_json: false
    options:
      temperature: 0.0
      num_predict: 100
      num_ctx: 2048
    prompt: |
      ### ROLE
      Music Playlist API. Extract ACTION and NAME from French input.

      ### DATABASE (Existing Playlists)
      REPLACE_PLAYLISTS

      ### ACTIONS DEFINITION
      1. PLAY: Start a list. (NAME = Exact match from DATABASE or "UNKNOWN" if no match).
      2. CREATE: Create a new playlist. (RULE: NAME = new name mentioned).
      3. ADD: Add current song to list. (RULE: NAME = "CURRENT").
      4. DEL: Remove current song from list. (RULE: NAME = "CURRENT").
      5. INFO: Ask about list content.

      ### STRICT RULES
      1. FORCED MATCH: For 'PLAY', you MUST return the closest name from DATABASE. If "Toho" and 'Touhou' exists, return "Touhou".
      2. AUTO-FILL: For 'ADD' and 'DEL', you MUST return "CURRENT" for the NAME.
      3. NO GUESSING: If no action or name is found, return {"ACTION": "NONE", "NAME": "NONE"}.
      4. OUTPUT: ONLY JSON. No prose. No markdown tags.

      ### OUTPUT FORMAT
      {
        "ACTION": "string",
        "NAME": "string"
      }

      ### EXAMPLES
      Input: "Lance ma liste Toho" (DATABASE: Touhou)
      Output: {"ACTION": "PLAY", "NAME": "Touhou"}

      Input: "Vire cette musique"
      Output: {"ACTION": "DEL", "NAME": "CURRENT"}

  VLC_AGENT:
    name: "VLC_AGENT"
    model: "qwen2.5:3b"
    use_json: false
    options:
      temperature: 0.0
      num_predict: 100
      num_ctx: 2048
    prompt: |
      ### ROLE
      Act as a Music Control Classifier API.

      ### OBJECTIVE
      Classify the user's music request into exactly ONE of the following ACTIONS.

      ### ACTIONS & KEYWORDS
      - TOGGLE: (Pause, reprends, remets, relance, play, stop, arrête, continue, coupe). Use this for any request to start/stop or resume the current stream.
      - PREVIOUS: (Précédent, avant, revient, recommence la chanson, retour).
      - NEXT: (suivante, prochaine, après, saute, change, une autre, après).
      - VOL_DOWN: (Baisse, moins fort, diminue, doucement, calme).
      - VOL_UP: (Monte, plus fort, augmente, du son).
      - SHUFFLE: (Aléatoire, mélange, random).
      - INFO: (C'est quoi, quel titre, qui chante, infos).
      - UNKNOWN: Use if the request is not about controlling the player.

      ### STRICT RULES
      1. INPUT ANALYSIS: "Remets" or "Relance" must always be classified as TOGGLE.
      2. SYNTAX: Output ONLY a valid JSON object. No markdown, no prose.
      3. FALLBACK: If unsure, return UNKNOWN.

      ### OUTPUT FORMAT
      {
        "ACTION": "string"
      }

      ### EXAMPLES
      Input: "Alice, remets la musique"
      Output: {"ACTION": "TOGGLE"}

      Input: "Passe à la suite"
      Output: {"ACTION": "NEXT"}

      Input: "C'est un peu trop fort"
      Output: {"ACTION": "VOL_DOWN"}
