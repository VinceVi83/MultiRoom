MUSIC_VLC:
  MUSIC_AGENT:
    model: "llama3.1:8b"
    use_json: true
    options:
      temperature: 0.0
      num_predict: 20
      num_ctx: 2048
    prompt: |
      Task: Classify the music/media request into a numeric ID.
      
      IDs:
      1: DISCOVER (General requests to start playback: 'met de la musique', 'lance un album', 'joue quelque chose')
      2: PLAYLIST (Specific targets: artist names, playlist names, genres)
      3: MUSIC (Playback control ONLY: stop, play, pause, skip, next/suivante, previous, volume)
      0: NONE (Not related to media playback)
      
      STRICT RULES:
      1. Return a JSON object with the key "ID".
      2. Be extremely literal.
      
      Example: {"ID": "2"}

  PLAYLIST_AGENT:
    model: "llama3.1:8b"
    use_json: true
    options:
      temperature: 0.0
      num_predict: 50
      num_ctx: 2048
    prompt: |
      Act as a Playlist Extraction API.
      Task: Extract action and playlist name.
      
      Existing Playlists:
      REPLACE_PLAYLISTS

      STRICT RULES:
      1. FULL SCAN: Analyze the entire user input to find a match in 'Existing Playlists' OR a new name if the action is 'CREATE'.
      2. MATCHING PRIORITIES: - If a name from 'Existing Playlists' is detected (even with extra words like "Lance la..."), extract it.
      3. If the action is "CREATE", extract the new name following the command.
      4. NO GUESSING: If NO playlist name is explicitly mentioned in the input, return {"0": "0"}.
      5. GENERIC FALLBACK: Return {"0": "0"} only for vague requests without a specific target (e.g., "Joue de la musique", "Lance la playlist").

      Context:
      Actions: "PLAY", "CREATE", "ADD", "DEL", "INFO".

      Example Output:
      {
        "ACTION": "NAME"
      }
      {
        "PLAY": "Touhou"
      }

      Constraint: Output ONLY the JSON object. No prose. No explanations.

  VLC_AGENT:
    model: "llama3.1:8b"
    use_json: true
    options:
      seed: 42
      temperature: 0.0
      num_predict: 20
      num_ctx: 2048
    prompt: |
      Task: Jukebox Control Classification.
      
      IDs:
      1: TOGGLE (Pause, resume, play, stop)
      2: PREVIOUS (Previous track, go back, restart song)
      3: NEXT (Next track, skip, change song)
      4: VOL_DOWN (Lower volume, quieter, softer)
      5: VOL_UP (Increase volume, louder, turn it up)
      6: SHUFFLE (Random mode, mix it up)
      7: INFO (What is playing, current song details)
      0: UNKNOWN (Unknown or unrelated to music)

      Constraint: Return a JSON object with the key "ID".
      
      Example: {"ID": "1"}

  SHOP_ADD:
    model: "llama3.1:8b"
    use_json: true
    options:
      temperature: 0.0
      num_predict: 200
      num_ctx: 2048
    prompt: |
      Task: Extract only the names of the food items.
      Example:
      {
        "items": ["milk", "eggs"]
      }
      Rule: Return ONLY JSON.
