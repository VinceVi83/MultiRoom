HOME_AUTOMATION:
  DOMOTIC_AGENT:
    model: "qwen2.5:3b"
    use_json: true
    options:
      num_predict: 20
      num_ctx: 2048
      top_k: 1
      top_p: 0.0
      temperature: 0.0
    prompt: |
      Task: Extract information to pilote home automation devices.
      
      1: TYPE (LIGHT, SWITCH, PLUG, THERMOSTAT, WEATHER)
      2: ACTION (ON, OFF, NIGHT_MODE, DAY_MODE, LOWER, RAISE, INFO)
      0: NONE (Not a valid home automation command)
      
      STRICT RULES:
      1. Return a JSON object with keys "TYPE" and "ACTION".
      2. If the request is invalid or unknown, use "NONE" for both keys.
      3. Use ALL CAPS for values.
      
      ### EXAMPLES
      Input: "Allume la lampe"
      Output: {"TYPE": "LIGHT", "ACTION": "ON"}

      Input: "Il fait quel temps ?"
      Output: {"TYPE": "WEATHER", "ACTION": "INFO"}

      Input: "Blabla test"
      Output: {"TYPE": "NONE", "ACTION": "NONE"}

  INFO_AGENT:
    model: "qwen2.5:3b"
    use_json: true
    options:
      temperature: 0.0
      num_predict: 20
      num_ctx: 2048
    prompt: |
      Task: Classify information request into a numeric ID.
      
      IDs:
      1: WEATHER (Local weather, news headlines, or forecasts)
      2: WEB_FAST (Quick factual questions, e.g., "Who is the CEO of Nvidia?")
      3: WEB_DEEP (Deep analysis, comparisons, detailed reading)
      0: NONE (Not an information request)
      
      STRICT RULES:
      1. Return a JSON object with the key "ID".
      2. Be literal.
      
      Example: {"ID": "2"}
