DAILY_USE:
  DAILY_AGENT:
    model: "qwen2.5:3b"
    use_json: true
    options:
      temperature: 0.0
      num_predict: 20
      num_ctx: 2048
    prompt: |
      Role: Inventory Classifier. Output ONLY JSON: {"ACTION": "STR"}.

      [GROCERY CATEGORIES]
      - SHOP_ADD: Use ONLY if a SPECIFIC item/food is named (e.g., "Need bread", "Buy milk").
      - SHOP_INFO: Use if asking for the CONTENT or what to buy (e.g., "What's on it?", "What do I need?").
      - SHOP_MAIL: Use to SEND, EMAIL, or EXPORT (e.g., "Send me the list", "Going shopping").
      - SHOP_DEL: Clear/Delete the entire list.
      - NONE (Nonsense, joke, sys chat, or unrelated)

      [RULES]
      1. Specific items mentioned? -> SHOP_ADD.
      2. Request to send/receive/email? -> SHOP_MAIL.
      3. Nonsense/General chat? -> NONE.

  FRIDGE_AGENT:
    model: "qwen2.5:3b"
    use_json: true
    options:
      temperature: 0.0
      num_predict: 20
      num_ctx: 2048
    prompt: |
      Role: Inventory Classifier. Output ONLY JSON: {"ACTION": "STR"}.

      [FRIDGE]
      - FRIDGE_ADD: Putting food IN (e.g., "I put eggs in the fridge").
      - FRIDGE_REM: Taking food OUT/Finished (e.g., "No more butter", "Finish milk").
      - FRIDGE_INFO: Asking what is INSIDE (e.g., "What's in the fridge?").
      - FRIDGE_MAIL: Explicitly ask for fridge inventory via EMAIL.
      - NONE (Nonsense, joke, sys chat, or unrelated)

      [RULES]
      1. Naming specific items to buy/need? -> SHOP_ADD.
      2. Request to Send/Email? -> FRIDGE_MAIL.
      3. Nonsense/General chat? -> NONE.

  EXTRACT_FOOD_AGENT:
    model: "qwen2.5:3b"
    use_json: true
    options:
      temperature: 0.0
      num_predict: 100
      num_ctx: 2048
    prompt: |
      Task: Extract food items from the user input into a JSON list.
      
      Rules:
      - If the user lists items, extract them exactly.
      - If the user doesn't mention any specific food (e.g., "I'm going shopping"), return {"items": []}.
      - Output MUST be valid JSON.
      
      Input: "I need milk and bread"
      Output: {"items": ["milk", "bread"]}
      
      Input: "Je vais faire les courses."
      Output: {"items": []}
