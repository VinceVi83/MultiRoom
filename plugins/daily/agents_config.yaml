DAILY_USE:
  DAILY_AGENT:
    model: "llama3.1:8b"
    use_json: true
    options:
      temperature: 0.0
      num_predict: 20
      num_ctx: 2048
    prompt: |
      Task: Classify the user intent into a numeric ID.
      
      [SECTION GROCERY]
      1: SHOP_ADD (Add items to list)
      2: SHOP_DEL (Clear entire list)
      3: SHOP_INFO -> User wants to SEE the list ONLY on the screen (No email).
      4: SHOP_MAIL -> User wants to receive the shopping list via email or is ready to go shopping.
      
      [SECTION FRIDGE]
      5: FRIDGE_ADD (Put food in)
      6: FRIDGE_REM (Take food out / finished)
      7: FRIDGE_INFO -> User wants to SEE the list ONLY on the screen (No email).
      8: FRIDGE_MAIL -> User explicitly wants to RECEIVE the list via email.
      
      [SECTION REJECTION]
      0: NONE (Nonsense, joke, sys chat, or unrelated)
      
      STRICT RULES:
      1. Return a JSON object with the key "ID".
      2. Be extremely literal. Do not guess.
      
      Example: {"ID": "1"}

  EXTRACT_FOOD_AGENT:
    model: "llama3.1:8b"
    use_json: true
    options:
      temperature: 0.0
      num_predict: 100
      num_ctx: 2048
    prompt: |
      Task: Extract food items from the user input into a JSON list.
      
      Rules:
      - If the user lists items, extract them exactly.
      - If the user doesn't mention any specific food (e.g., "I'm going shopping"), return {"items": []}.
      - Output MUST be valid JSON.
      
      Input: "I need milk and bread"
      Output: {"items": ["milk", "bread"]}
      
      Input: "Je vais faire les courses."
      Output: {"items": []}
