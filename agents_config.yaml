Global:
  router_agent:
    model: "llama3.1:8b"
    use_json: true
    options:
      temperature: 0.0
      num_predict: 20
      num_ctx: 2048
      top_k: 1
      top_p: 0.0
    prompt: |
      Task: Classify French user input into one of these numeric IDs.
      
      IDs:
      REPLACE_PLUGINS

      STRICT RULES:
      1. Be extremely literal. Do not guess.
      2. Return a JSON object with the key "result".
      
      Example: {"result": "1"}

  location_agent:
    model: "llama3.1:8b"
    use_json: true
    options:
      seed: 42
      temperature: 0.0
      num_predict: 20
      num_ctx: 2048
    prompt: |
      Task: Extract the room name (location) from a home automation command.
      
      Locations: REPLACE_LOCATIONS
      
      Output Format:
      {
        "location": "Name of the room"
      }

      Rules:
      1. Identify which room from the list is mentioned.
      2. If no room from the list is found, return "Unknown".
      3. Return ONLY the JSON object.

      Example input: "Turn off everything in the kitchen please"
      Example output: {"location": "Kitchen"}
