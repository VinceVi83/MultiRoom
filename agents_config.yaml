# Agent Configuration File
# This YAML file defines agent configurations for the routing and location systems.
# Each section contains an agent with model settings, options, and prompts.

Global:
  router_agent:
    model: "llama3.1:8b"
    use_json: true
    options:
      temperature: 0.0
      num_predict: 20
      num_ctx: 2048
      top_k: 1
      top_p: 0.0
    prompt: |
      Task: Classify French user input into one of these numeric IDs.
      
      IDs:
      REPLACE_PLUGINS

      STRICT RULES:
      1. Be extremely literal. Do not guess.
      2. Return a JSON object with the key "ID".
      3. If an input matches multiple IDs or is ambiguous, you MUST return "ID" "0".
      4. Do not attempt to overlap categories.
      
      Example: {"ID": "1"}

  location_agent:
    model: "llama3.1:8b"
    use_json: true
    options:
      seed: 42
      temperature: 0.0
      num_predict: 20
      num_ctx: 2048
    prompt: |
      Task: Extract the room name (location) from a home automation command.
      
      Locations: REPLACE_LOCATIONS
      
      Output Format:
      {
        "location": "Name of the room"
      }

      Rules:
      1. Search for a mention of one of the Locations in the input text.
      2. REPLACE_RULE_LOCATIONS
      3. If NO location from the list is mentioned, you MUST return {"location": "Unknown"}.
      4. If a location is found, return its exact name from the list.
      5. Strictly return ONLY the JSON object.
      
      Input: "Turn off the light" -> {"location": "Unknown"}
      Input: "Turn on the kitchen" -> {"location": "Kitchen"}

  pre_process_agent: # Experience to limit error from transcription or user
    model: llama3.1:8b
    use_json: true
    options:
      temperature: 0.0
      num_predict: 100
      num_ctx: 512
      top_k: 1
      top_p: 0.0
    prompt: |
      ### OBJECTIVE
      Validate French transcription and map intent to an English action verb.

      ### CLASSIFICATION
      - ACT: (Lance, fais, joue, allume, ajoute, démarre, balance, mets, active, annule, supprime, coupe)
      - TELL: (Dis, raconte, annonce, répète)
      - SEND: (Envoie, mail, transmets, poste)
      - SEARCH: (Trouve, cherche, regarde, check, c'est quoi)
      - PLAN: (Rappelle-moi, programme, alarme, note)

      ### CRITICAL RULES
      1. COHERENCE: If input is noise, nonsensical, or pure politesse/chatter without a command (e.g., euh, test, ah), return: {"valid": 0}.
      2. SYSTEM: If input is Be ready, return: {"valid": 1, "normalized_verb": IDLE, "subject": keep_alive}.
      3. PROCESSING: If input is a valid command, return: {"valid": 1, "normalized_verb": VERB, "subject": French subject only}.

      ### EXAMPLES
      Input: Euh... bah... ouais
      Output: {"valid": "0"}

      Input: Be ready
      Output: {"valid": "1", "normalized_verb": IDLE, "subject": keep_alive}

      Input: Balance du son dans la cuisine
      Output: {"valid": "1", "normalized_verb": ACT, "subject": musique dans la cuisine}

      ### OUTPUT
      Strict JSON only
