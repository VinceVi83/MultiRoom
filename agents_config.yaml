      Extract the main artist name. 
      Respond with JSON format: {"artist": "NAME"}
  
  extract_address:
    use_json: true
    options:
      temperature: 0.0
    prompt: |
      Extract the venue and city.
      Respond with JSON format: {"location": "VENUE, CITY"}






GlobalLLM:
  generic:
    use_json: false
    options:
      seed: 42
      temperature: 0.3
      num_predict: 500
      num_ctx: 2048
    prompt: |
      Task: Assistant généraliste.
      Instruction: Réponds de manière concise et directe.
      Language: Français.
      Constraint: Pas d'introduction, pas de conclusion, va droit au but.

  weather_forecast:
    use_json: true
    options:
      seed: 42
      temperature: 0.1
      num_predict: 500
      num_ctx: 2048
    prompt: |
      Task: Assistant Météo Précis.
      Instruction: Analyse les données météo pour la date et le lieu fournis.
      Language: Français.
      Constraint: Réponse en JSON pur. Pas de texte avant ou après.
      Structure:
        - global: { temp_avg: int, rain_risk: "high|med|low", summary: string }
        - periods:
            morning: { temp: int, rain: boolean, desc: string }
            afternoon: { temp: int, rain: boolean, desc: string }
            evening: { temp: int, rain: boolean, desc: string }

  traffic_checker:
    use_json: true
    options:
      temperature: 0.1
      num_predict: 500
    prompt: |
      Task: Analyse de perturbations transports (IDF/Paris).
      Context: Trajet de {origin} vers {destination}.
      Input: Données de trafic en temps réel (RATP/SNCF).
      Instruction: Identifie UNIQUEMENT les incidents bloquants sur cet itinéraire.
      Language: Français.
      Constraint: Réponse en JSON. Si tout est fluide, "status" est "OK".
      Format: 
        {
          "status": "OK" | "DELAY" | "BLOCK",
          "impacted_lines": ["Ligne X", "RER Y"],
          "message": "Court résumé de l'impact",
          "alternative": "Suggestion rapide si besoin"
        }
        
  location_agent:
    use_json: true
    options:
      seed: 42
      temperature: 0.0
      num_predict: 20
      num_ctx: 2048
    prompt: |
      Task: Extract the room name (location) from a French home automation command.
      
      Locations: REPLACE_LOCATIONS
      
      Output Format:
      {
        "location": "Name of the room"
      }

      Rules:
      1. Identify which room from the list is mentioned.
      2. If no room from the list is found, return "Unknown".
      3. Return ONLY the JSON object.

      Example input: "Éteins tout dans la cuisine s'il te plaît"
      Example output: {"location": "Cuisine"}

  mail:
    use_json: true
    options:
      seed: 42
      temperature: 0.0
      num_predict: 400
      num_ctx: 4096
    prompt: |
      Task: Extract recipient and message body.
      Example:
      {
        "to": "jean@mail.com", 
        "body": "Salut, on se voit demain ?"
      }
      Constraint: Return ONLY JSON.






