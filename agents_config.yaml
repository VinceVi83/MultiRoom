# LLM Agent Configuration File
#
# This YAML file defines configurations for various LLM agents used in the system.
# Each agent has specific prompts, options, and settings tailored to their role.
#
# Sections:
#    - RouterLLM: Main router agents for intent classification
#    - ConcertManager: Agents for concert data extraction
#    - GlobalLLM: General-purpose LLM agents for various tasks

RouterLLM:
  router_thematic:
    use_json: true
    options:
      temperature: 0.0
      num_predict: 20
      num_ctx: 2048
      top_k: 1
      top_p: 0.0
    prompt: |
      Task: Classify French user input into one of these numeric IDs.
      
      IDs:
      1: DOMOTIC (Lights, plugs, temperature control)
      2: CALENDAR (Dates, appointments, concerts, schedules)
      3: INFO (Weather, news, web research)
      4: DAILY (Grocery, fridge, achat, courses)
      5: MUSIC (Music, playlists)
      0: NONE (Nonsense, philosophy, or no clear action)

      STRICT RULES:
      1. Be extremely literal. Do not guess.
      2. Return a JSON object with the key "result".
      
      Example: {"result": "1"}

RouterLLM_SUB:
  DOMOTIC_AGENT:
    use_json: true
    options:
      num_predict: 20
      num_ctx: 2048
      top_k: 1
      top_p: 0.0
      temperature: 0.0
    prompt: |
      Task: Extract information to pilote home automation devices.
      
      1: TYPE of device (eg. LIGHT, SWITCH, PLUG, THERMOSTAT)
      2: ACTION (ON/OFF/NIGHT_MODE/DAY_MODE/LOWER_BRIGHTNESS/RAISE_BRIGHTNESS/INFO)
      0: NONE (Not a valid home automation command)
      
      STRICT RULES:
      1. Return a JSON object with the key "TYPE", "ACTION".
      2. Be extremely literal.
      
      Example: {"TYPE": "LIGHT", "ACTION": "ON"} or  {"TYPE": "NONE", "ACTION": "NONE"}

  INFO_AGENT:
    use_json: true
    options:
      temperature: 0.0
      num_predict: 20
      num_ctx: 2048
    prompt: |
      Task: Classify information request into a numeric ID.
      
      IDs:
      1: WEATHER (Local weather, news headlines, or forecasts)
      2: WEB_FAST (Quick factual questions, e.g., "Who is the CEO of Nvidia?")
      3: WEB_DEEP (Deep analysis, comparisons, detailed reading)
      0: NONE (Not an information request)
      
      STRICT RULES:
      1. Return a JSON object with the key "ID".
      2. Be literal.
      
      Example: {"ID": "2"}

  CALENDAR_AGENT:
    use_json: true
    options:
      temperature: 0.0
      num_predict: 20
      num_ctx: 2048
    prompt: |
      Task: Classify the CALENDAR request into a numeric ID.
      
      IDs:
      1: NEXT_RDV (Next generic appointment)
      2: NEXT_CONCERT (Next concert event)
      3: CURRENT_WEEK (Schedule for the current week)
      4: NEXT_WEEK (Schedule for the next week)
      5: MAIL_NEXT_CONCERT (Send next concert details by email)
      0: NONE (Not a valid calendar request)
      
      STRICT RULES:
      1. Return a JSON object with the key "ID".
      2. Be extremely literal. Do not guess.
      
      Example: {"ID": "1"}
  
  CALENDAR_REPORTER:
    use_json: false
    options:
      seed: 42
      temperature: 0.0
      top_k: 1
      top_p: 0.0
      num_predict: 800
      num_ctx: 4096
      repeat_penalty: 1.1
      repeat_last_n: 64
      options:
        temperature: 0.7
    prompt: |
      Task: Act as a friendly and efficient personal assistant.
      
      Instruction: 
      Receive raw data (JSON or text) and transform it into a natural, concise, and polite response in English.
      
      Rules:
      - Do not invent information not present in the data.
      - If the data is empty or indicates an error, respond with empathy.
      - Use a warm tone but remain direct.
      - Respond only with the final sentence, no comments.

      Constraint: The response must be ready to be read by a text-to-speech system.

  DAILY_AGENT:
    use_json: true
    options:
      temperature: 0.0
      num_predict: 20
      num_ctx: 2048
    prompt: |
      Task: Classify the user intent into a numeric ID.
      
      [SECTION GROCERY]
      1: SHOP_ADD (Add items to list)
      2: SHOP_DEL (Clear entire list)
      3: SHOP_MAIL (Send list via email)
      4: SHOP_INFO (Query information about list)
      
      [SECTION FRIDGE]
      5: FRIDGE_ADD (Put food in)
      6: FRIDGE_REM (Take food out / finished)
      7: FRIDGE_INFO (Check stock)

      [SECTION REJECTION]
      0: NONE (Nonsense, joke, general chat, or unrelated)
      
      STRICT RULES:
      1. Return a JSON object with the key "ID".
      2. Be extremely literal. Do not guess.
      
      Example: {"ID": "1"}

  MUSIC_AGENT:
    use_json: true
    options:
      temperature: 0.0
      num_predict: 20
      num_ctx: 2048
    prompt: |
      Task: Classify the music/media request into a numeric ID.
      
      IDs:
      1: PLAYLIST (Requesting a specific music playlist or artist)
      2: MUSIC (Controls: stop, play, pause, skip, volume, next)
      0: NONE (Not related to media playback)
      
      STRICT RULES:
      1. Return a JSON object with the key "ID".
      2. Be extremely literal.
      
      Example: {"ID": "2"}

  PLAYLIST_AGENT:
    use_json: true
    options:
      temperature: 0.0
      num_predict: 50
      num_ctx: 2048
    prompt: |
      Task: Extract playlist name.
      
      Existing Playlists:
      REPLACE

      Instructions:
      1. Identify the 'PLAYLIST' from the list of Existing Playlists.
      2. If the user mentions a name NOT in the list (e.g., for CREATE_PLAYLIST), extract that new name.
      3. Always favor the exact spelling from 'Existing Playlists' if a match is close.

      Context:
      - Action: CREATE_PLAYLIST, ADD_TO_PLAYLIST, DEL_FROM_PLAYLIST, INFO_PLAYLIST.

      Example Output:
      {
        "PLAYLIST": "Rock Chill"
      }

      Constraint: Output ONLY the JSON object.
      Rule: If no playlist name is found or the request is unclear, return {"PLAYLIST": "0"}.

  VLC_AGENT:
    use_json: true
    options:
      seed: 42
      temperature: 0.0
      num_predict: 20
      num_ctx: 2048
    prompt: |
      Task: Jukebox Control Classification.
      
      IDs:
      1: TOGGLE (Pause, resume, play, stop)
      2: PREVIOUS (Previous track, go back, restart song)
      3: NEXT (Next track, skip, change song)
      4: VOL_DOWN (Lower volume, quieter, softer)
      5: VOL_UP (Increase volume, louder, turn it up)
      6: SHUFFLE (Random mode, mix it up)
      7: INFO (What is playing, current song details)
      0: UNKNOWN (Unknown or unrelated to music)

      Constraint: Return a JSON object with the key "ID".
      
      Example: {"ID": "1"}

  SHOP_ADD:
    use_json: true
    options:
      temperature: 0.0
      num_predict: 200
      num_ctx: 2048
    prompt: |
      Task: Extract only the names of the food items.
      Example:
      {
        "items": ["milk", "eggs"]
      }
      Rule: Return ONLY JSON.


ConcertManager:
  extract_artist:
    use_json: true
    options:
      temperature: 0.0
    prompt: |
      Extract the main artist name. 
      Respond with JSON format: {"artist": "NAME"}
  
  extract_address:
    use_json: true
    options:
      temperature: 0.0
    prompt: |
      Extract the venue and city.
      Respond with JSON format: {"location": "VENUE, CITY"}

GlobalLLM:
  generic:
    use_json: false
    options:
      seed: 42
      temperature: 0.3
      num_predict: 500
      num_ctx: 2048
    prompt: |
      Task: General-purpose assistant.
      Instruction: Respond concisely and directly.
      Language: English.
      Constraint: No introduction, no conclusion, get straight to the point.

  weather_forecast:
    use_json: true
    options:
      seed: 42
      temperature: 0.1
      num_predict: 500
      num_ctx: 2048
    prompt: |
      Task: Precise Weather Assistant.
      Instruction: Analyze weather data for the provided date and location.
      Language: English.
      Constraint: Pure JSON response only. No text before or after.
      Structure:
        - global: { temp_avg: int, rain_risk: "high|med|low", summary: string }
        - periods:
            morning: { temp: int, rain: boolean, desc: string }
            afternoon: { temp: int, rain: boolean, desc: string }
            evening: { temp: int, rain: boolean, desc: string }

  traffic_checker:
    use_json: true
    options:
      temperature: 0.1
      num_predict: 500
    prompt: |
      Task: Analyze transport disruptions (IDF/Paris).
      Context: Route from {origin} to {destination}.
      Input: Real-time traffic data (RATP/SNCF).
      Instruction: Identify ONLY blocking incidents on this route.
      Language: English.
      Constraint: JSON response only. If everything is smooth, "status" is "OK".
      Format: 
        {
          "status": "OK" | "DELAY" | "BLOCK",
          "impacted_lines": ["Line X", "RER Y"],
          "message": "Brief summary of impact",
          "alternative": "Quick suggestion if needed"
        }
        
  location_agent:
    use_json: true
    options:
      seed: 42
      temperature: 0.0
      num_predict: 20
      num_ctx: 2048
    prompt: |
      Task: Extract the room name (location) from a home automation command.
      
      Locations: REPLACE_LOCATIONS
      
      Output Format:
      {
        "location": "Name of the room"
      }

      Rules:
      1. Identify which room from the list is mentioned.
      2. If no room from the list is found, return "Unknown".
      3. Return ONLY the JSON object.

      Example input: "Turn off everything in the kitchen please"
      Example output: {"location": "Kitchen"}

  mail:
    use_json: true
    options:
      seed: 42
      temperature: 0.0
      num_predict: 400
      num_ctx: 4096
    prompt: |
      Task: Extract recipient and message body.
      Example:
      {
        "to": "jean@mail.com", 
        "body": "Hi, shall we meet tomorrow?"
      }
      Constraint: Return ONLY JSON.


  french_research_agent:
    model: "mistral-nemo:12b-instruct-v1-q4_K_M"
    use_json: false
    options:
      seed: 42
      temperature: 0.0
      top_k: 1
      top_p: 0.0
      num_predict: 800
      num_ctx: 4096
      repeat_penalty: 1.1
    prompt: |
      Task: Rigorous factual synthesis.
      Instruction: Extract and structure data without embellishments.
      Language: English only.
      Rules: 
      1. No introduction, no conclusion.
      2. Bullet points for facts.
      3. Precise figures and dates required.
      4. Cite [Source: domain.com].


  french_research_agent_extreme:
    model: "mistral-nemo:12b-instruct-v1-q4_K_M"
    use_json: false
    options:
      seed: 42
      temperature: 0.0
      top_k: 1
      top_p: 0.0
      num_predict: 1500
      num_ctx: 8192
      repeat_penalty: 1.15
      repeat_last_n: 128
    prompt: |
      Task: Analysis of long and complex documents.
      Instruction: Synthesize information in a purely factual manner.
      Language: English only.
      Rules:
      1. Structure by key technical points.
      2. Exhaustive extraction of data (names, dates, figures).
      3. Zero embellishment, direct and professional style.
      4. Cite [Source: domain.com].

  global_research_agent:
    model: "qwen2.5:7b-instruct"
    use_json: false
    options:
      seed: 42
      temperature: 0.0
      top_k: 1
      top_p: 0.0
      num_predict: 50
      num_ctx: 2048
      repeat_penalty: 1.1
    prompt: |
      Task: Quick factual extraction from web snippets.
      Instruction: Provide a direct answer based on the context. 
      Constraint: Be extremely concise. Cite [Source: domain.com].

  global_research_agent_heavy:
    model: "qwen2.5:7b-instruct"
    use_json: false
    options:
      seed: 42
      temperature: 0.2
      top_k: 20
      top_p: 0.1
      num_predict: 1000
      num_ctx: 24576
      repeat_penalty: 1.1
      repeat_last_n: 128
    prompt: |
      Task: Deep web analysis and cross-referencing.
      Instruction: Synthesize information from multiple full-page sources.
      Constraint: Use bullet points. Cite sources using [1], [2] with URLs at the end.

  global_research_agent_extreme:
    model: "qwen2.5:7b-instruct"
    use_json: false
    options:
      seed: 42
      temperature: 0.1
      num_predict: 2000
      num_ctx: 32768
      repeat_penalty: 1.2
      repeat_last_n: 256
    prompt: |
      Task: Exhaustive document parsing and technical summary.
      Instruction: Analyze the entire 32k context window for hidden details.
      Constraint: Detail every technical specification found.
